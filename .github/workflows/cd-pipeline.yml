name: Deploy to AWS EC2

on:
  push:
    branches:
      - "main"
  pull_request:
    types: [closed]
    branches:
      - "main"
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Execute Deployment Script on EC2
        env:
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          PROJECT_PATH="${EC2_PROJECT_PATH:-/home/ubuntu/src/mate-fastapi-homework-5}"
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "bash ${PROJECT_PATH}/commands/deploy.sh"
